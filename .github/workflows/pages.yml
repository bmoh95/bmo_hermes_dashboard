name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site/assets _site/data
          cp -f .nojekyll README.md *.html wedding.ics _site/
          cp -f assets/*.css assets/*.js assets/wedding-gallery-sample-*.svg _site/assets/
          cp -R assets/vendor _site/assets/vendor
          cp -f data/*.json _site/data/
      - name: Push gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tmpdir="$(mktemp -d)"
          cp -a _site/. "$tmpdir/"
          git checkout --orphan gh-pages
          git rm -rf . || true
          git clean -fdx
          cp -a "$tmpdir/." .
          touch .nojekyll
          git add -A
          git commit -m "Deploy Pages $GITHUB_SHA" || exit 0
          git push --force origin gh-pages
